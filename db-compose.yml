version: '3.7'

services:
  db:
    image: postgres:16
    restart: always
    container_name: postgresql
    networks:
      sql:
    volumes:
      - ../postgresql-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: icc115-2023
      POSTGRES_USER: seatsurfing
      POSTGRES_DB: seatsurfing
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin4
    restart: always
    networks:
      sql:
    ports:
      - "8443:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ues.edu.sv
      PGADMIN_DEFAULT_PASSWORD: icc115-2023
    volumes:
      - pgadmin-data:/var/lib/pgadmin

volumes:
  pgadmin-data:

networks:
  sql:
  http:
